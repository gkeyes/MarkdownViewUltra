name: markdown_view_ultra
description: A lightweight Markdown previewer app for Android - open .md files via "Open with"

publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ^3.11.4
  flutter: 3.41.6

dependencies:
  flutter:
    sdk: flutter
  markdown: ^7.3.1
  webview_flutter: ^4.10.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true